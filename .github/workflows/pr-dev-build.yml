# Build a versioned dev distribution for every pull request and verify it
# installs and runs, so changes can be tested before the PR is merged.
#
# Versioning: the project uses setuptools-scm, which derives a PEP 440 dev
# version with the commit hash automatically for any commit after the latest
# tag, e.g. `0.1.16.dev3+g1a2b3c4`. The `+g<hash>` local segment is the
# best-practice "dev suffix" and uniquely identifies the build.

name: PR Dev Build

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-dev-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build dev distribution
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.scm.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags are required for setuptools-scm to compute the
          # dev version (and the commit-hash suffix).
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compute dev version
        id: scm
        shell: bash
        run: |
          python -m pip install --quiet setuptools-scm
          VERSION="$(python -m setuptools_scm)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "### Dev build version" >> "$GITHUB_STEP_SUMMARY"
          echo "\`$VERSION\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Build sdist and wheel
        run: uv build

      - name: List built distributions
        shell: bash
        run: ls -1 dist/

      - name: Upload dev distribution
        uses: actions/upload-artifact@v4
        with:
          name: report-compiler-dev-pr${{ github.event.pull_request.number || github.run_id }}
          path: dist/
          if-no-files-found: error

  smoke-test:
    name: Install and run on Windows
    needs: build
    runs-on: windows-latest
    steps:
      - name: Download built distribution
        uses: actions/download-artifact@v4
        with:
          name: report-compiler-dev-pr${{ github.event.pull_request.number || github.run_id }}
          path: dist

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install built wheel
        shell: bash
        run: python -m pip install dist/*.whl

      - name: Smoke test (entry point + version)
        shell: bash
        run: |
          report-compiler --help
          INSTALLED="$(python -c 'from report_compiler._version import __version__ as v; print(v)')"
          echo "Installed and ran report-compiler $INSTALLED"
          echo "### Windows smoke test" >> "$GITHUB_STEP_SUMMARY"
          echo "Installed \`$INSTALLED\` and ran the entry point successfully." >> "$GITHUB_STEP_SUMMARY"
